<section class="hero">
  <!-- Background slides -->
  <div class="hero__slides">
    @for (slide of slides; track $index) {
      <div
        class="hero__slide"
        [class.active]="$index === activeSlide()"
        [style.background-image]="'url(' + slide.image + ')'"
      ></div>
    }
  </div>

  <!-- Overlay -->
  <div class="hero__overlay"></div>

  <!-- Content -->
  <div class="container hero__content">
    <div class="hero__text">
      <span class="hero__eyebrow">{{ slides[activeSlide()].eyebrow }}</span>
      <h1 class="hero__title">
        @for (line of titleLines; track $index) {
          <span class="hero__title-line">{{ line }}</span>
        }
      </h1>
      <p class="hero__subtitle">{{ slides[activeSlide()].subtitle }}</p>
      <div class="hero__cta-group">
        <button class="hero__btn hero__btn--primary">
          {{ slides[activeSlide()].cta }}
          <i class="fas fa-arrow-right"></i>
        </button>
        <button class="hero__btn hero__btn--outline">View All Collections</button>
      </div>
    </div>

    <!-- Stats strip -->
    <div class="hero__stats">
      <div class="hero__stat">
        <span class="hero__stat-value">500+</span>
        <span class="hero__stat-label">Premium Products</span>
      </div>
      <div class="hero__stat-divider"></div>
      <div class="hero__stat">
        <span class="hero__stat-value">50K+</span>
        <span class="hero__stat-label">Happy Athletes</span>
      </div>
      <div class="hero__stat-divider"></div>
      <div class="hero__stat">
        <span class="hero__stat-value">30+</span>
        <span class="hero__stat-label">Top Brands</span>
      </div>
    </div>
  </div>

  <!-- Slide Controls -->
  <div class="hero__controls">
    <button class="hero__arrow hero__arrow--prev" (click)="prevSlide()" aria-label="Previous">
      <i class="fas fa-chevron-left"></i>
    </button>
    <div class="hero__dots">
      @for (slide of slides; track $index) {
        <button
          class="hero__dot"
          [class.active]="$index === activeSlide()"
          (click)="goToSlide($index)"
          [attr.aria-label]="'Slide ' + ($index + 1)"
        ></button>
      }
    </div>
    <button class="hero__arrow hero__arrow--next" (click)="nextSlide()" aria-label="Next">
      <i class="fas fa-chevron-right"></i>
    </button>
  </div>
</section>
