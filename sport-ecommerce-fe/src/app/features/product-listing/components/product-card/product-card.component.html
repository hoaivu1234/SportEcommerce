<div class="product-card">
  <div class="product-card__image-wrap">
    <img [src]="imageUrl" [alt]="product.name" class="product-card__image" loading="lazy" />
    @if (product.badge) {
      <span class="product-card__badge" [class.badge--sale]="product.badge === 'Sale'" [class.badge--new]="product.badge === 'New'">
        {{ product.badge }}
      </span>
    }
    <button class="product-card__wishlist" title="Add to Wishlist">
      <i class="far fa-heart"></i>
    </button>
  </div>

  <div class="product-card__body">
    <p class="product-card__name">{{ product.name }}</p>

    <div class="product-card__stars">
      @for (star of stars; track $index) {
        <i class="fas"
          [class.fa-star]="star === 'full' || star === 'empty'"
          [class.fa-star-half-alt]="star === 'half'"
          [class.star--empty]="star === 'empty'">
        </i>
      }
    </div>

    <div class="product-card__footer">
      <span class="product-card__price">{{ product.price | currency }}</span>
      <button class="btn-add-cart">
        <i class="fas fa-shopping-bag"></i> Add to Cart
      </button>
    </div>
  </div>
</div>
