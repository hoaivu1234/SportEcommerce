<div class="table-wrapper">
  <table class="product-table">
    <thead>
      <tr>
        <th class="col-check">
          <input type="checkbox" [checked]="allChecked" (change)="toggleAll($event)" />
        </th>
        <th class="col-image">Image</th>
        <th class="col-details">Product Details</th>
        <th class="col-sku">SKU</th>
        <th class="col-price">Price</th>
        <th class="col-stock">Stock Level</th>
        <th class="col-status">Status</th>
        <th class="col-actions">Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (product of products; track product.id) {
        <tr [class.selected]="product.checked">
          <td class="col-check">
            <input type="checkbox" [(ngModel)]="product.checked" (change)="toggleOne()" />
          </td>
          <td class="col-image">
            <img [src]="product.image" [alt]="product.name" class="product-img" />
          </td>
          <td class="col-details">
            <div class="product-name">{{ product.name }}</div>
            <div class="product-category">{{ product.category }}</div>
          </td>
          <td class="col-sku">
            <span class="sku-code">{{ product.sku }}</span>
          </td>
          <td class="col-price">
            <span class="price">{{ product.price }}</span>
          </td>
          <td class="col-stock">
            <div class="stock-info">
              <span class="stock-count">{{ product.stock }} units</span>
              <div class="stock-bar-bg">
                <div
                  class="stock-bar stock-bar-{{ product.stockClass }}"
                  [style.width]="getStockPercent(product.stock, product.stockMax) + '%'"
                ></div>
              </div>
            </div>
          </td>
          <td class="col-status">
            <span class="status-badge {{ product.statusClass }}">{{ product.status }}</span>
          </td>
          <td class="col-actions">
            <div class="action-btns">
              <button class="action-btn" title="View">
                <i class="fas fa-eye"></i>
              </button>
              <button class="action-btn" title="Edit">
                <i class="fas fa-pen"></i>
              </button>
              <button class="action-btn" title="More">
                <i class="fas fa-ellipsis-vertical"></i>
              </button>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>

<!-- Pagination -->
<div class="pagination">
  <button class="page-btn" disabled>
    <i class="fas fa-chevron-left"></i> Previous
  </button>
  <div class="page-numbers">
    <button class="page-num active">1</button>
    <button class="page-num">2</button>
    <button class="page-num">3</button>
    <span class="page-ellipsis">…</span>
    <button class="page-num">250</button>
  </div>
  <button class="page-btn">
    Next <i class="fas fa-chevron-right"></i>
  </button>
</div>
