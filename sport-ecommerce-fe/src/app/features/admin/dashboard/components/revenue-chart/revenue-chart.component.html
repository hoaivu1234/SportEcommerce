<div class="chart-card">
  <div class="chart-header">
    <div>
      <h3 class="chart-title">Sales Performance</h3>
      <p class="chart-subtitle">Revenue trends over time</p>
    </div>
    <div class="chart-tabs">
      <button
        class="tab-btn"
        [class.active]="activeTab === 'daily'"
        (click)="setTab('daily')"
      >Daily</button>
      <button
        class="tab-btn"
        [class.active]="activeTab === 'monthly'"
        (click)="setTab('monthly')"
      >Monthly</button>
    </div>
  </div>

  <div class="chart-area">
    <div class="y-axis">
      <span>$5k</span>
      <span>$4k</span>
      <span>$3k</span>
      <span>$2k</span>
      <span>$1k</span>
      <span>$0</span>
    </div>
    <div class="bars-wrapper">
      <div class="bars-container">
        @for (bar of bars; track bar.label) {
          <div class="bar-group">
            <div class="bar-tooltip">{{ bar.amount }}</div>
            <div class="bar" [style.height]="bar.value + '%'"></div>
            <span class="bar-label">{{ bar.label }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</div>
