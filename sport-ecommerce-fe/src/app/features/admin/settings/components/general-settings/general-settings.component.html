<div class="general-settings">
  <!-- Store Profile -->
  <div class="settings-section">
    <div class="section-header">
      <h3 class="section-title">Store Profile</h3>
      <p class="section-desc">Basic store information visible to customers.</p>
    </div>
    <div class="settings-form">
      <div class="form-group">
        <label>Store Name</label>
        <input type="text" class="form-input" [(ngModel)]="storeName" />
      </div>
      <div class="form-group">
        <label>Contact Email</label>
        <input type="email" class="form-input" [(ngModel)]="contactEmail" />
      </div>
      <div class="form-group">
        <label>Physical Address</label>
        <input type="text" class="form-input" placeholder="e.g. 123 Main St, Los Angeles, CA 90001" [(ngModel)]="physicalAddress" />
      </div>
    </div>
  </div>

  <div class="section-divider"></div>

  <!-- Regional & Localization -->
  <div class="settings-section">
    <div class="section-header">
      <h3 class="section-title">Regional & Localization</h3>
      <p class="section-desc">Configure currency, units, and regional settings.</p>
    </div>
    <div class="settings-form">
      <div class="form-group">
        <label>Currency</label>
        <select class="form-select" [(ngModel)]="currency">
          <option value="USD">USD $</option>
          <option value="EUR">EUR €</option>
          <option value="GBP">GBP £</option>
          <option value="VND">VND ₫</option>
        </select>
      </div>
      <div class="form-group">
        <label>Weight Unit</label>
        <select class="form-select" [(ngModel)]="weightUnit">
          <option value="kg">Kilograms (kg)</option>
          <option value="lb">Pounds (lb)</option>
          <option value="g">Grams (g)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Timezone</label>
        <select class="form-select" [(ngModel)]="timezone">
          <option value="UTC-8">UTC-8 Pacific Time</option>
          <option value="UTC-5">UTC-5 Eastern Time</option>
          <option value="UTC+0">UTC+0 GMT</option>
          <option value="UTC+7">UTC+7 Indochina</option>
        </select>
      </div>
    </div>
  </div>
</div>
