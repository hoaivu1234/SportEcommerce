logging:
  level:
    ROOT: INFO
    com.sport.ecommerce: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG
    com.zaxxer.hikari.HikariConfig: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sport_ecommerce
    username: root
    password: root

    hikari:
      auto-commit: false
      connection-timeout: 10000
      maximum-pool-size: 20
      max-lifetime: 7200000
      pool-name: spring-boot-hikari-mysql-cp

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    url: jdbc:mysql://localhost:3306/sport_ecommerce?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    user: root
    password: root